<!-- Translation Link Component -->
<!-- Shows link to original article for translated pages -->
<!-- Usage: {% include translated-from.html %} -->

{% if page.translated_from %}
<div class="translated-from" style="margin-top: 2em; padding: 1em; background: #f0f0f0; border-radius: 4px;">
  <h4 style="margin-bottom: 0.5em;">Version Originale</h4>
  <p style="margin: 0; font-size: 0.9em;">
    Cet article est une traduction de :
    <a href="{{ page.translated_from.url }}">{{ page.translated_from.title }}</a>
    {% if page.translated_from.lang == "zh" %}
      (中文版)
    {% elsif page.translated_from.lang == "en" %}
      (English)
    {% endif %}
  </p>
</div>
{% endif %}
