# Site settings
title: "Digital Marketing Knowledge Base"
description: "全渠道数字营销知识库 - 搜索广告、社媒运营、数据分析、增长策略"
url: "https://chaorendan.github.io"
baseurl: "/B2B-website-test"
theme: minima
locale: zh-CN
timezone: Asia/Shanghai

# Google Tag Manager
gtm_container_id: "GTM-M2XCSSGJ"

header_pages:
  - search-ads.md
  - analytics.md
  - about.md

collections:
  knowledge:
    output: true
    permalink: /knowledge/:path/
  fr:
    output: true
  geo:
    output: true
    permalink: /geo/:path/

defaults:
  - scope:
      path: "_knowledge"
      type: "knowledge"
    values:
      layout: "page"
      author: "Digital Marketing Expert"
      published: true
      lang: "en"
  - scope:
      path: "_fr"
      type: "fr"
    values:
      layout: "page"
      author: "Digital Marketing Expert"
      published: true
      lang: "fr"
  - scope:
      path: "_geo"
      type: "geo"
    values:
      layout: "page"
      author: "Digital Marketing Expert"
      published: true
      lang: "zh"

# Multi-language settings
languages:
  - code: "en"
    name: "English"
    default: true
  - code: "fr"
    name: "French"
    url_prefix: "/fr/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - "*.backup"
  - "*.new"
  - _ARCHITECTURE_DESIGN.md
  - _TEMPLATE.md
